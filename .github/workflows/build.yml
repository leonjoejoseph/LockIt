name: Compile Legacy APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Bypasses the strict runner restrictions on older code bases
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      # Downgrading the action versions to v2 makes them compatible with legacy setups
      - uses: actions/checkout@v2
      
      - name: set up JDK 8
        uses: actions/setup-java@v2
        with:
          java-version: '8'
          distribution: 'temurin'

      # Fixes possible end-of-line configuration issues from old repositories
      - name: Fix line endings for gradlew
        run: sed -i 's/\r$//' gradlew

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LockIt-TV-and-Phone-APKs
          path: |
            **/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/release/*.apk
